// librewolf.cfg
// Injects the custom startpage as both the new-tab page and the startup homepage.
// STARTPAGE_URL is replaced with the correct file:// path by deploy.sh.
//
// IMPORTANT: This comment on line 1 is required — the file must start with a comment.
var {classes:Cc, interfaces:Ci, utils:Cu} = Components;

try {
  // Load the modern ES Module for new-tab management (Firefox 136+ / LibreWolf)
  ChromeUtils.defineESModuleGetters(this, {
    AboutNewTab: "resource:///modules/AboutNewTab.sys.mjs"
  });

  var newTabURL = "STARTPAGE_URL";

  // Override the new-tab page
  AboutNewTab.newTabURL = newTabURL;

  // Override the startup/home page
  // browser.startup.page values: 0 = blank, 1 = homepage, 2 = restore session, 3 = both
  pref("browser.startup.page",     1);
  pref("browser.startup.homepage", newTabURL);

} catch(e) {
  Cu.reportError(e);
}
